<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualização D3.js</title>
</head>
<body>
    <h1>O meu projeto D3.js</h1>
    <div id="visualizacao"></div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <script>
                // Selecionamos o div com id "visualizacao"
                const svg = d3.select("#visualizacao")
                    .append("svg")
                    .attr("width", 200)
                    .attr("height", 200);

                // Desenhamos um círculo
                svg.append("circle")
                    .attr("cx", 100)
                    .attr("cy", 100)
                    .attr("r", 50)
                    .style("fill", "steelblue");
    </script>
</body>
</html>
