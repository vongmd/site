<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualização D3.js</title>
</head>
<body>
    <h1>O meu projeto D3.js</h1>
    <div id="visualizacao"></div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <script>
        // Teste rápido para confirmar que o D3 está a funcionar
        d3.select("#visualizacao")
          .append("p")
          .text("O D3.js foi carregado com sucesso.");
    </script>
</body>
</html>
